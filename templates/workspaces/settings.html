{% extends "base.html" %}
{% block title %}Settings - {{ workspace.name }} - {{ app_name }}{% endblock %}
{% block content %}
<div class="page" style="max-width:640px;">
  <h1>Workspace Settings</h1>
  <div class="sub">{{ workspace.name }}</div>
  <div class="card" style="margin-top:20px;">
    <form method="POST">
      <div class="field">
        <div class="label">Workspace Name *</div>
        <input name="name" value="{{ workspace.name }}" required />
      </div>
      <div class="field">
        <div class="label">Server IP</div>
        <input name="server_ip" value="{{ workspace.server_ip or '' }}" placeholder="e.g. 165.22.123.55" />
      </div>
      <div class="field">
        <div class="label">Server User</div>
        <input name="server_user" value="{{ workspace.server_user or '' }}" placeholder="e.g. root" />
      </div>
      <div class="flex gap-8">
        <button type="submit" class="btn btn-primary">Save Settings</button>
        <a href="/workspaces/{{ workspace.slug }}/dashboard" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
