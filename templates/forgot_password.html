<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password - {{ app_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body>
<div class="page-narrow">
  <div style="text-align:center;margin-bottom:32px;">
    <div style="font-size:28px;margin-bottom:8px;">&#9672;</div>
    <h1>Reset Password</h1>
    <div class="sub">Enter your email and we'll send you a reset link</div>
  </div>
  {% if sent %}
  <div class="msg msg-ok">If an account exists with that email, we've sent a reset link. Check your inbox.</div>
  <div style="text-align:center;margin-top:16px;">
    <a href="/login" style="color:#fff;font-size:13px;">Back to login</a>
  </div>
  {% else %}
  <div class="card">
    <form method="POST">
      <div class="field"><div class="label">Email</div><input name="email" type="email" required autofocus placeholder="you@example.com" /></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;">Send Reset Link</button>
    </form>
  </div>
  <div style="text-align:center;margin-top:16px;font-size:13px;color:#555;">
    Remember your password? <a href="/login" style="color:#fff;">Sign in</a>
  </div>
  {% endif %}
</div>
<script src="{{ url_for('static', filename='csrf.js') }}"></script>
</body>
</html>
