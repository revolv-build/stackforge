<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set New Password - {{ app_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body>
<div class="page-narrow">
  <div style="text-align:center;margin-bottom:32px;">
    <div style="font-size:28px;margin-bottom:8px;">&#9672;</div>
    <h1>Set New Password</h1>
    <div class="sub">Choose a new password for your account</div>
  </div>
  {% if err %}<div class="msg msg-err">{{ err }}</div>{% endif %}
  <div class="card">
    <form method="POST">
      <div class="field"><div class="label">New Password</div><input name="password" type="password" placeholder="Min 8 characters" required autofocus /></div>
      <div class="field"><div class="label">Confirm Password</div><input name="password_confirm" type="password" placeholder="Re-enter password" required /></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;">Update Password</button>
    </form>
  </div>
</div>
<script src="{{ url_for('static', filename='csrf.js') }}"></script>
</body>
</html>
