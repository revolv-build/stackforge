{% extends "base.html" %}
{% block title %}Edit: {{ app.name }} - {{ app_name }}{% endblock %}
{% block content %}
<div class="page" style="max-width:640px;">
  <h1>Edit App</h1>
  <div class="card">
    <form method="POST">
      <div class="field">
        <div class="label">App Name</div>
        <input name="name" value="{{ app.name }}" required autofocus />
      </div>
      <div class="field">
        <div class="label">URL</div>
        <input name="url" value="{{ app.url }}" placeholder="https://..." />
      </div>
      <div class="field">
        <div class="label">GitHub URL</div>
        <input name="github_url" value="{{ app.github_url }}" placeholder="https://github.com/..." />
      </div>
      <div class="field-row">
        <div class="field">
          <div class="label">Server Path</div>
          <input name="server_path" value="{{ app.server_path }}" />
        </div>
        <div class="field">
          <div class="label">Port</div>
          <input name="port" type="number" value="{{ app.port }}" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <div class="label">Systemd Service</div>
          <input name="service_name" value="{{ app.service_name }}" />
        </div>
        <div class="field">
          <div class="label">Log File Path</div>
          <input name="log_path" value="{{ app.log_path }}" />
        </div>
      </div>
      <div class="field">
        <div class="label">Description</div>
        <textarea name="description" style="min-height:80px;">{{ app.description }}</textarea>
      </div>
      <div class="flex gap-8">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/workspaces/{{ workspace.slug }}/apps/{{ app.slug }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
