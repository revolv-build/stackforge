<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - {{ app_name }}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <style>.hp-field { position:absolute;left:-9999px;opacity:0;height:0;width:0;overflow:hidden; }</style>
</head>
<body>
<div class="page-narrow">
  <div style="text-align:center;margin-bottom:32px;">
    <div style="font-size:28px;margin-bottom:8px;">&#9672;</div>
    <h1>{{ app_name }}</h1>
    <div class="sub">Create your account</div>
  </div>
  {% if err %}<div class="msg msg-err">{{ err }}</div>{% endif %}
  <div class="card">
    <form method="POST">
      <input type="hidden" name="_ts" value="{{ form_ts }}" />
      <div class="field"><div class="label">Name</div><input name="name" placeholder="Your full name" value="{{ name or '' }}" required autofocus /></div>
      <div class="field"><div class="label">Email</div><input name="email" type="email" placeholder="you@example.com" value="{{ email or '' }}" required /></div>
      <div class="hp-field" aria-hidden="true">
        <label>Website URL</label>
        <input name="website_url" type="text" autocomplete="off" tabindex="-1" />
      </div>
      <div class="field"><div class="label">Password</div><input name="password" type="password" placeholder="Min 8 characters" required /></div>
      <div class="field"><div class="label">Confirm Password</div><input name="password_confirm" type="password" placeholder="Re-enter password" required /></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;">Create Account</button>
    </form>
  </div>
  <div style="text-align:center;margin-top:16px;font-size:13px;color:#555;">
    Already have an account? <a href="/login" style="color:#fff;">Sign in</a>
  </div>
</div>
<script src="{{ url_for('static', filename='csrf.js') }}"></script>
</body>
</html>
